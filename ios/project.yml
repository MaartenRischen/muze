name: Jammerman
options:
  bundleIdPrefix: com.jammerman
  deploymentTarget:
    iOS: "17.0"

targets:
  Jammerman:
    type: application
    platform: iOS
    sources:
      - Jammerman
    info:
      path: Jammerman/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jammerman.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: false
        INFOPLIST_KEY_NSCameraUsageDescription: "Jammerman uses your camera to track face and hand gestures for music control"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Jammerman uses the microphone for audio recording"
