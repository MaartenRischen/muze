<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>MUZE</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mixer.css">
<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>

<!-- Drum touch zones -->
<div id="touch-zone">
  <div id="zone-hat" class="drum-cell" data-drum="hat" data-label="hat"></div>
  <div id="zone-snare" class="drum-cell" data-drum="snare" data-label="snare"></div>
  <div id="zone-kick" class="drum-cell" data-drum="kick" data-label="kick"></div>
</div>

<!-- Chord bar -->
<div id="chord-zone">
  <div class="chord-btn" data-chord="0">I</div>
  <div class="chord-btn" data-chord="1">ii</div>
  <div class="chord-btn" data-chord="2">iii</div>
  <div class="chord-btn" data-chord="3">IV</div>
  <div class="chord-btn" data-chord="4">V</div>
  <div class="chord-btn" data-chord="5">vi</div>
</div>

<!-- Overlays -->
<div id="riser-overlay"></div>
<div id="rhythm-indicator">AUTO</div>

<!-- Debug (hidden by default, tap top-left to toggle) -->
<button id="debug-toggle" aria-label="Toggle debug"></button>
<div id="debug"></div>

<!-- Mode HUD -->
<div id="mode-hud-wrap">
  <button id="freeze-btn">&#10052;</button>
  <div id="mode-hud"></div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <button class="toolbar-label" id="rec-multitrack">STEREO</button>
  <button class="toolbar-btn" id="rec-btn" aria-label="Record">&#9679;</button>
  <button class="toolbar-btn" id="pause-btn" aria-label="Pause">&#10074;&#10074;</button>
  <button class="toolbar-btn" id="help-btn" aria-label="Help" style="font-weight:bold">?</button>
  <button class="toolbar-btn" id="mixer-btn" aria-label="Mixer" style="font-size:10px;font-weight:600;letter-spacing:0.5px">MIX</button>
  <button class="toolbar-btn" id="synth-menu-btn" aria-label="Settings">&#9881;</button>
</div>

<!-- Sample switcher -->
<div id="sample-bar">
  <button class="sample-btn" id="pad-sample-btn"><span class="label">PAD</span>FM Synth</button>
  <button class="sample-btn" id="lead-sample-btn"><span class="label">LEAD</span>Synth</button>
</div>

<!-- Recording canvas -->
<canvas id="rec-canvas"></canvas>

<!-- Tutorial -->
<div id="tut-picker">
  <h2>Tutorial</h2>
  <p>Learn to play Muze step by step while the app is running</p>
  <button class="tut-choice" id="tut-basic">Basic<small>Face + touch essentials</small></button>
  <button class="tut-choice" id="tut-advanced">Advanced<small>Every control + sound design</small></button>
  <button id="tut-close-pick">cancel</button>
</div>
<div id="tut-overlay">
  <div id="tut-card">
    <div class="tut-step-label" id="tut-step-label"></div>
    <div class="tut-title" id="tut-title"></div>
    <div class="tut-desc" id="tut-desc"></div>
    <div class="tut-nav">
      <button class="tut-skip" id="tut-exit">exit</button>
      <button id="tut-prev">&larr; back</button>
      <button id="tut-next">next &rarr;</button>
    </div>
  </div>
</div>

<!-- Synth Panel -->
<div id="synth-panel">
  <div id="synth-tabs">
    <button class="synth-tab active" data-tab="tab-arp">Arp</button>
    <button class="synth-tab" data-tab="tab-mel">Melody</button>
    <button class="synth-tab" data-tab="tab-pad">Pad</button>
    <button class="synth-tab" data-tab="tab-bin">Binaural</button>
  </div>

  <div class="synth-tab-content active" id="tab-arp">
    <h3>Synth</h3>
    <div class="synth-row"><label>wave</label><select class="synth-select" id="arp-osc"><option>sawtooth</option><option>triangle</option><option>square</option><option>sine</option></select></div>
    <div class="synth-row"><label>attack</label><input type="range" id="arp-atk" min="0.001" max="2" step="0.01" value="0.01"><span class="val">0.01</span></div>
    <div class="synth-row"><label>decay</label><input type="range" id="arp-dec" min="0.01" max="2" step="0.01" value="0.3"><span class="val">0.30</span></div>
    <div class="synth-row"><label>sustain</label><input type="range" id="arp-sus" min="0" max="1" step="0.01" value="0.6"><span class="val">0.60</span></div>
    <div class="synth-row"><label>release</label><input type="range" id="arp-rel" min="0.01" max="4" step="0.01" value="0.8"><span class="val">0.80</span></div>
  </div>

  <div class="synth-tab-content" id="tab-mel">
    <h3>Mode</h3>
    <div class="synth-row"><label>porta</label><button class="synth-select" id="mel-porta" style="text-align:center">OFF</button></div>
    <h3>Synth</h3>
    <div class="synth-row"><label>wave</label><select class="synth-select" id="mel-osc"><option>triangle</option><option>sawtooth</option><option>square</option><option>sine</option></select></div>
    <div class="synth-row"><label>attack</label><input type="range" id="mel-atk" min="0.001" max="2" step="0.01" value="0.05"><span class="val">0.05</span></div>
    <div class="synth-row"><label>decay</label><input type="range" id="mel-dec" min="0.01" max="2" step="0.01" value="0.2"><span class="val">0.20</span></div>
    <div class="synth-row"><label>sustain</label><input type="range" id="mel-sus" min="0" max="1" step="0.01" value="0.7"><span class="val">0.70</span></div>
    <div class="synth-row"><label>release</label><input type="range" id="mel-rel" min="0.01" max="4" step="0.01" value="0.4"><span class="val">0.40</span></div>
  </div>

  <div class="synth-tab-content" id="tab-pad">
    <h3>Synth</h3>
    <div class="synth-row"><label>wave</label><select class="synth-select" id="pad-osc"><option>sine</option><option>triangle</option><option>sawtooth</option><option>square</option></select></div>
    <div class="synth-row"><label>harm</label><input type="range" id="pad-harm" min="0.5" max="8" step="0.1" value="2"><span class="val">2.0</span></div>
    <div class="synth-row"><label>mod idx</label><input type="range" id="pad-mod" min="0" max="10" step="0.1" value="1.2"><span class="val">1.2</span></div>
    <div class="synth-row"><label>attack</label><input type="range" id="pad-atk" min="0.01" max="4" step="0.01" value="1.0"><span class="val">1.00</span></div>
    <div class="synth-row"><label>release</label><input type="range" id="pad-rel" min="0.1" max="8" step="0.1" value="2.5"><span class="val">2.5</span></div>
  </div>

  <div class="synth-tab-content" id="tab-bin">
    <h3>Binaural Beats</h3>
    <div class="synth-row"><label>on/off</label><button class="synth-select" id="bin-toggle" style="text-align:center">OFF</button></div>
    <div class="synth-row"><label>mode</label><button class="synth-select" id="bin-mode" style="text-align:center">tonic</button></div>
    <div class="synth-row"><label>beat hz</label><input type="range" id="bin-hz" min="1" max="20" step="0.5" value="4"><span class="val">4.0</span></div>
  </div>
</div>

<!-- Mixer Panel (slides up from bottom) -->
<div id="mixer-panel">
  <div id="mixer-header">
    <span>MIXER</span>
    <button id="mixer-close">&times;</button>
  </div>
  <div id="mixer-strips">
    <!-- Built by MixerUI.init() -->
  </div>
  <div id="mixer-detail" class="hidden">
    <!-- Built by MixerUI._openDetail() -->
  </div>
</div>

<!-- Start Screen -->
<div id="start-screen">
  <h1>Muze</h1>
  <p>Your body is the instrument. Create music with your face, hands, and touch.</p>
  <button id="start-btn">Touch to Begin</button>
  <span id="loading-text">Loading...</span>
</div>

<!-- JS Modules -->
<script src="js/config.js"></script>
<script src="js/tracking.js"></script>
<script src="js/music.js"></script>
<script src="js/mixer.js"></script>
<script src="js/audio.js"></script>
<script src="js/visualizer.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<!-- Bootstrap (ES module for MediaPipe import) -->
<script type="module">
import { FaceLandmarker, HandLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs';

document.getElementById('start-btn').addEventListener('click', async () => {
  const ss = document.getElementById('start-screen');
  ss.classList.add('loading');

  try {
    // Audio + Camera (samples load in background)
    await MUZE.Audio.init();
    MUZE.SampleLib.loadAll().then(() => console.log('Samples loaded'));
    document.getElementById('loading-text').textContent = 'Starting camera...';
    await MUZE.Camera.init();

    // MediaPipe
    document.getElementById('loading-text').textContent = 'Loading face + hand models...';
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
    );
    await Promise.all([
      MUZE.FaceTracker.init(FaceLandmarker, vision),
      MUZE.HandTracker.init(HandLandmarker, vision),
    ]);

    // Init UI
    MUZE.Touch.init();
    MUZE.SynthMenu.init();
    MUZE.MixerUI.init();
    MUZE.SampleUI.init();
    MUZE.Tutorial.init();
    MUZE.Recorder.init();

    // Restore saved settings
    MUZE.Storage.load();
    MUZE.Storage.enableAutoSave();

    // Freeze button
    document.getElementById('freeze-btn').addEventListener('click', () => {
      MUZE.State.modeFrozen = !MUZE.State.modeFrozen;
      document.getElementById('freeze-btn').classList.toggle('frozen', MUZE.State.modeFrozen);
      document.getElementById('mode-hud').classList.toggle('frozen', MUZE.State.modeFrozen);
    });

    // Pause button
    const pauseBtn = document.getElementById('pause-btn');
    pauseBtn.addEventListener('click', () => {
      if (MUZE.Loop._running) {
        MUZE.Loop._running = false;
        MUZE.Audio.releasePad();
        MUZE.Audio.stopMelody();
        MUZE.Audio.stopArpeggio();
        if (MUZE.AutoRhythm.isActive()) MUZE.AutoRhythm.stop();
        Tone.Transport.pause();
        pauseBtn.textContent = '\u25B6';
        pauseBtn.classList.add('paused');
      } else {
        Tone.Transport.start();
        MUZE.Loop._running = true;
        MUZE.Loop._tick();
        pauseBtn.textContent = '\u23F8';
        pauseBtn.classList.remove('paused');
      }
    });

    MUZE.Loop.init();

    // Fade out start screen
    ss.classList.add('fade-out');
    setTimeout(() => ss.remove(), 600);

    MUZE.Loop.start();
  } catch (err) {
    console.error('MUZE init failed:', err);
    document.getElementById('loading-text').textContent = 'Error: ' + err.message;
    ss.classList.remove('loading');
  }
});
</script>

</body>
</html>
